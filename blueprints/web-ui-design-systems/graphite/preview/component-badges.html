<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 160px; display: flex; flex-direction: column; gap: 12px; }
  .row-b { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pill {
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 999px;
    border: 1px solid var(--border-default);
    color: var(--fg-1); background: var(--bg-raised);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 999px; }
  .count {
    font-family: var(--font-mono); font-size: 11px;
    min-width: 18px; height: 18px; padding: 0 6px; border-radius: 999px;
    background: var(--bg-hover); color: var(--fg-1);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .count.accent { background: var(--accent-500); color: #1a1205; }
  .chip {
    font-family: var(--font-sans); font-size: 12px;
    padding: 3px 10px 3px 8px; border-radius: 999px;
    border: 1px solid var(--border-default); background: var(--bg-raised); color: var(--fg-1);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .chip .x { color: var(--fg-3); }
</style></head><body>
<span class="eyebrow">Status pills</span>
<div class="row-b">
  <span class="pill"><span class="dot" style="background: var(--status-success)"></span>Ready</span>
  <span class="pill"><span class="dot" style="background: var(--status-warning)"></span>Building</span>
  <span class="pill"><span class="dot" style="background: var(--status-danger)"></span>Failed</span>
  <span class="pill"><span class="dot" style="background: var(--status-info)"></span>Idle</span>
  <span class="pill" style="color: var(--fg-accent); border-color: var(--accent-700);"><span class="dot" style="background: var(--accent-500)"></span>Selected</span>
</div>
<span class="eyebrow" style="margin-top: 4px;">Counts & filter chips</span>
<div class="row-b">
  <span class="count">3</span>
  <span class="count">12</span>
  <span class="count accent">NEW</span>
  <span class="chip">branch: main <span class="x">×</span></span>
  <span class="chip">env: production <span class="x">×</span></span>
  <span class="chip">author: a.chen <span class="x">×</span></span>
</div>
</body></html>

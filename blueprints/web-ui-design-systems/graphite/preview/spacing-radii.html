<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 160px; display: flex; flex-direction: column; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; flex: 1; align-items: stretch; }
  .cell { border: 1px solid var(--border-default); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: var(--bg-raised); }
  .cell .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); }
  .cell .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head><body>
<span class="eyebrow">Radii · small, conservative</span>
<div class="grid">
  <div class="cell" style="border-radius: 3px;"><span class="name">xs</span><span class="val">3px</span></div>
  <div class="cell" style="border-radius: 4px;"><span class="name">sm ★</span><span class="val">4px · default</span></div>
  <div class="cell" style="border-radius: 6px;"><span class="name">md</span><span class="val">6px · cards</span></div>
  <div class="cell" style="border-radius: 8px;"><span class="name">lg</span><span class="val">8px · modals</span></div>
  <div class="cell" style="border-radius: 999px;"><span class="name">full</span><span class="val">pills</span></div>
</div>
</body></html>

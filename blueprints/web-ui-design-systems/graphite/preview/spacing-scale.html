<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 180px; display: flex; flex-direction: column; gap: 14px; }
  .ladder { display: flex; align-items: flex-end; gap: 10px; flex: 1; padding-bottom: 4px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: var(--accent-500); width: 10px; border-radius: 2px 2px 0 0; }
  .lab { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
  .val { font-family: var(--font-mono); font-size: 9px; color: var(--fg-2); }
</style></head><body>
<div class="row" style="justify-content: space-between;">
  <span class="eyebrow">Spacing · 4px base</span>
  <span class="eyebrow mono" style="color: var(--fg-2);">space-1 … space-20</span>
</div>
<div class="ladder">
  <div class="step"><div class="bar" style="height: 4px;"></div><span class="val">4</span><span class="lab">1</span></div>
  <div class="step"><div class="bar" style="height: 8px;"></div><span class="val">8</span><span class="lab">2</span></div>
  <div class="step"><div class="bar" style="height: 12px;"></div><span class="val">12</span><span class="lab">3</span></div>
  <div class="step"><div class="bar" style="height: 16px;"></div><span class="val">16</span><span class="lab">4</span></div>
  <div class="step"><div class="bar" style="height: 20px;"></div><span class="val">20</span><span class="lab">5</span></div>
  <div class="step"><div class="bar" style="height: 24px;"></div><span class="val">24</span><span class="lab">6</span></div>
  <div class="step"><div class="bar" style="height: 32px;"></div><span class="val">32</span><span class="lab">8</span></div>
  <div class="step"><div class="bar" style="height: 40px;"></div><span class="val">40</span><span class="lab">10</span></div>
  <div class="step"><div class="bar" style="height: 48px;"></div><span class="val">48</span><span class="lab">12</span></div>
  <div class="step"><div class="bar" style="height: 64px;"></div><span class="val">64</span><span class="lab">16</span></div>
  <div class="step"><div class="bar" style="height: 80px;"></div><span class="val">80</span><span class="lab">20</span></div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 170px; display: flex; flex-direction: column; gap: 14px; }
  .row-b { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    height: 32px; padding: 0 14px;
    border-radius: 4px; border: 1px solid transparent;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; transition: background 100ms var(--ease-out);
  }
  .btn.primary { background: var(--accent-500); color: #1a1205; border-color: var(--accent-500); }
  .btn.secondary { background: var(--bg-raised); color: var(--fg-1); border-color: var(--border-default); }
  .btn.ghost { background: transparent; color: var(--fg-1); border-color: transparent; }
  .btn.destructive { background: transparent; color: var(--status-danger); border: 1px solid var(--border-default); }
  .btn.sm { height: 24px; padding: 0 10px; font-size: 12px; }
  .btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .kbd { font-family: var(--font-mono); font-size: 11px; padding: 1px 6px; border: 1px solid var(--border-default); border-bottom-width: 2px; border-radius: 3px; background: var(--bg-raised); color: var(--fg-2); }
</style></head><body>
<span class="eyebrow">Buttons</span>
<div class="row-b">
  <button class="btn primary">Deploy</button>
  <button class="btn secondary">Cancel</button>
  <button class="btn ghost">Dismiss</button>
  <button class="btn destructive">Delete</button>
  <button class="btn secondary disabled">Saving…</button>
</div>
<div class="row-b">
  <button class="btn primary sm">New</button>
  <button class="btn secondary sm">Filter <span class="kbd">F</span></button>
  <button class="btn ghost sm">View all →</button>
</div>
</body></html>

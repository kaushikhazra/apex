<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 150px; display: flex; flex-direction: column; gap: 10px; }
  .swatches { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; flex: 1; }
  .sw { position: relative; border-radius: 3px; border: 1px solid rgba(255,255,255,0.04); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .sw .n { font-family: var(--font-mono); font-size: 9px; color: var(--fg-2); opacity: 0.9; }
  .sw.dark .n { color: var(--fg-2); }
  .sw.light .n { color: var(--stone-800); }
</style></head><body>
<div class="row" style="justify-content: space-between;">
  <span class="eyebrow">Warm stone · 11 stops</span>
  <span class="eyebrow mono" style="color: var(--fg-2);">oklch-even · hue ≈ 60</span>
</div>
<div class="swatches">
  <div class="sw dark" style="background: var(--stone-950)"><span class="n">950</span></div>
  <div class="sw dark" style="background: var(--stone-875)"><span class="n">875</span></div>
  <div class="sw dark" style="background: var(--stone-800)"><span class="n">800</span></div>
  <div class="sw dark" style="background: var(--stone-750)"><span class="n">750</span></div>
  <div class="sw dark" style="background: var(--stone-600)"><span class="n">600</span></div>
  <div class="sw dark" style="background: var(--stone-500)"><span class="n">500</span></div>
  <div class="sw light" style="background: var(--stone-400)"><span class="n">400</span></div>
  <div class="sw light" style="background: var(--stone-300)"><span class="n">300</span></div>
  <div class="sw light" style="background: var(--stone-200)"><span class="n">200</span></div>
  <div class="sw light" style="background: var(--stone-100)"><span class="n">100</span></div>
  <div class="sw light" style="background: var(--stone-50)"><span class="n">50</span></div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 160px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cell { border: 1px solid var(--border-default); border-radius: 6px; padding: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
  .cell.dark { background: var(--bg-app); color: var(--fg-1); }
  .cell.light { background: var(--stone-100); color: var(--stone-950); }
  .cell .lbl { position: absolute; top: 8px; left: 10px; font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); }
  .cell.light .lbl { color: var(--stone-600); }
  .cell svg { width: 180px; height: auto; }
</style></head><body>
<div class="cell dark">
  <span class="lbl">on stone-950</span>
  <svg viewBox="0 0 200 40" fill="none">
    <g stroke="currentColor" stroke-width="3" stroke-linecap="square" fill="none"><path d="M6 8 L30 8 L30 16"/><path d="M6 20 L22 20"/><path d="M6 32 L30 32 L30 20"/></g>
    <text x="44" y="27" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="500" fill="currentColor" letter-spacing="-0.5">GRAPHITE</text>
  </svg>
</div>
<div class="cell light">
  <span class="lbl">on stone-100</span>
  <svg viewBox="0 0 200 40" fill="none">
    <g stroke="currentColor" stroke-width="3" stroke-linecap="square" fill="none"><path d="M6 8 L30 8 L30 16"/><path d="M6 20 L22 20"/><path d="M6 32 L30 32 L30 20"/></g>
    <text x="44" y="27" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="500" fill="currentColor" letter-spacing="-0.5">GRAPHITE</text>
  </svg>
</div>
</body></html>

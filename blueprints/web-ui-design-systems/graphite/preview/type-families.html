<!doctype html>
<html><head><meta charset="utf-8"><title>Type specimens</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 220px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { border: 1px solid var(--border-default); border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .panel .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .panel .big { font-size: 36px; line-height: 1; letter-spacing: -0.02em; color: var(--fg-1); }
  .panel .small { font-size: 12px; color: var(--fg-2); line-height: 1.5; }
  .mono-panel .big { font-family: var(--font-mono); font-weight: 500; }
  .sans-panel .big { font-family: var(--font-sans); font-weight: 600; }
  .weights { font-family: inherit; color: var(--fg-3); font-size: 11px; }
</style></head><body>
<div class="panel mono-panel">
  <span class="name">JetBrains Mono · display</span>
  <span class="big">Aa Bb 0123</span>
  <span class="small mono">main · 142ms · a3f9e2c</span>
  <span class="weights mono">400 · 500 · 600</span>
</div>
<div class="panel sans-panel">
  <span class="name">Inter · body</span>
  <span class="big">Aa Bb 0123</span>
  <span class="small">The quick brown fox jumps over the lazy dog.</span>
  <span class="weights">400 · 500 · 600 · 700</span>
</div>
</body></html>

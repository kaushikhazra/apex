<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 220px; display: flex; flex-direction: column; gap: 14px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
  td { padding: 6px 0; border-bottom: 1px solid var(--border-subtle); color: var(--fg-2); }
  td:first-child { color: var(--fg-1); width: 150px; }
  td:last-child { text-align: right; color: var(--fg-3); font-size: 11px; }
  .dot { display: inline-block; width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border-subtle); vertical-align: middle; margin-right: 10px; }
</style></head><body>
<span class="eyebrow">Semantic tokens</span>
<table>
  <tr><td><span class="dot" style="background: var(--bg-app)"></span>--bg-app</td><td>page</td><td>stone-950</td></tr>
  <tr><td><span class="dot" style="background: var(--bg-surface)"></span>--bg-surface</td><td>panels, sidebar</td><td>stone-925</td></tr>
  <tr><td><span class="dot" style="background: var(--bg-raised)"></span>--bg-raised</td><td>cards, kbd</td><td>stone-875</td></tr>
  <tr><td><span class="dot" style="background: var(--bg-hover)"></span>--bg-hover</td><td>hover surface</td><td>stone-850</td></tr>
  <tr><td><span class="dot" style="background: var(--fg-1)"></span>--fg-1</td><td>primary text</td><td>stone-150</td></tr>
  <tr><td><span class="dot" style="background: var(--fg-2)"></span>--fg-2</td><td>secondary text</td><td>stone-400</td></tr>
  <tr><td><span class="dot" style="background: var(--border-default)"></span>--border-default</td><td>structure</td><td>stone-750</td></tr>
</table>
</body></html>

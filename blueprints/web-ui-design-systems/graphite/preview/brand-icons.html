<!doctype html>
<html><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.446.0/dist/umd/lucide.min.js"></script>
<style>
  body { height: 180px; display: flex; flex-direction: column; gap: 12px; }
  .row-i { display: flex; flex-wrap: wrap; gap: 12px 18px; align-items: center; }
  .ico-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 56px; }
  .ico-cell i { width: 20px; height: 20px; color: var(--fg-1); }
  .ico-cell span { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style></head><body>
<div class="row" style="justify-content: space-between;">
  <span class="eyebrow">Iconography · Lucide · 1.5px stroke</span>
  <span class="note">substitution flagged</span>
</div>
<div class="row-i">
  <div class="ico-cell"><i data-lucide="layout-dashboard"></i><span>dashboard</span></div>
  <div class="ico-cell"><i data-lucide="git-branch"></i><span>branch</span></div>
  <div class="ico-cell"><i data-lucide="rocket"></i><span>deploy</span></div>
  <div class="ico-cell"><i data-lucide="activity"></i><span>activity</span></div>
  <div class="ico-cell"><i data-lucide="terminal"></i><span>logs</span></div>
  <div class="ico-cell"><i data-lucide="settings"></i><span>settings</span></div>
  <div class="ico-cell"><i data-lucide="users"></i><span>members</span></div>
  <div class="ico-cell"><i data-lucide="bell"></i><span>notif</span></div>
  <div class="ico-cell"><i data-lucide="search"></i><span>search</span></div>
  <div class="ico-cell"><i data-lucide="plus"></i><span>add</span></div>
  <div class="ico-cell"><i data-lucide="check"></i><span>check</span></div>
  <div class="ico-cell"><i data-lucide="x"></i><span>dismiss</span></div>
  <div class="ico-cell"><i data-lucide="chevron-right"></i><span>chevron</span></div>
  <div class="ico-cell"><i data-lucide="arrow-up-right"></i><span>external</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>

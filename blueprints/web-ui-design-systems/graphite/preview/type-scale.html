<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { height: 260px; }
  .row-spec { display: grid; grid-template-columns: 60px 1fr 100px; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .row-spec:last-child { border-bottom: none; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: right; }
  .sp { color: var(--fg-1); }
</style></head><body>
<span class="eyebrow" style="display:block; margin-bottom: 10px;">Type scale</span>
<div class="row-spec"><span class="tag">Display</span><span class="sp" style="font-family: var(--font-mono); font-size: 36px; font-weight: 500; letter-spacing: -0.02em;">Deploy now</span><span class="meta">44 / mono 500</span></div>
<div class="row-spec"><span class="tag">H1</span><span class="sp" style="font-family: var(--font-mono); font-size: 28px; font-weight: 500; letter-spacing: -0.02em;">Production overview</span><span class="meta">32 / mono 500</span></div>
<div class="row-spec"><span class="tag">H2</span><span class="sp" style="font-family: var(--font-mono); font-size: 22px; font-weight: 500;">Recent deployments</span><span class="meta">24 / mono 500</span></div>
<div class="row-spec"><span class="tag">H3</span><span class="sp" style="font-family: var(--font-sans); font-size: 17px; font-weight: 600;">Connect your repository</span><span class="meta">18 / sans 600</span></div>
<div class="row-spec"><span class="tag">Body</span><span class="sp" style="font-family: var(--font-sans); font-size: 14px;">Body copy lives here. Inter 14 by default.</span><span class="meta">14 / sans 400</span></div>
<div class="row-spec"><span class="tag">Caption</span><span class="sp" style="font-family: var(--font-sans); font-size: 13px; color: var(--fg-2);">Updated 3 minutes ago by a.chen</span><span class="meta">13 / sans 400</span></div>
<div class="row-spec"><span class="tag">Eyebrow</span><span class="sp eyebrow" style="font-size: 11px;">OVERVIEW</span><span class="meta">11 / mono caps</span></div>
</body></html>
